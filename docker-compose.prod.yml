# Production-oriented compose (no dev defaults). Set secrets via env file or Vault agent.
# Usage: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-casino}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-casino}
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-casino} -d ${POSTGRES_DB:-casino}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - data_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - data_net

  api:
    build:
      context: ./services/core
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      PLAYER_JWT_SECRET: ${PLAYER_JWT_SECRET:-}
      PORT: ${PORT:-9090}
      APP_ENV: production
      ADMIN_CORS_ORIGINS: ${ADMIN_CORS_ORIGINS:?set ADMIN_CORS_ORIGINS}
      PLAYER_CORS_ORIGINS: ${PLAYER_CORS_ORIGINS:?set PLAYER_CORS_ORIGINS}
    ports:
      - "${API_BIND:-127.0.0.1:9090}:9090"
    networks:
      - data_net
      - api_net

networks:
  data_net:
    internal: true
  api_net:

volumes:
  pgdata_prod:
  redisdata_prod:

services:
  vault:
    image: hashicorp/vault:1.19
    container_name: casino-vault-dev
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_LOG_LEVEL: info
    ports:
      - "8200:8200"
    command: server -dev

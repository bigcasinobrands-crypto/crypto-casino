services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: casino
      POSTGRES_PASSWORD: casino
      POSTGRES_DB: casino
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U casino -d casino"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - backend

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass casino-redis-local
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "casino-redis-local", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - backend

networks:
  backend:

volumes:
  pgdata:

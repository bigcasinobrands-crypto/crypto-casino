components:
  schemas:
    PlayerAPIError:
      type: object
      description: Standard player JSON error envelope from `playerapi.WriteError`.
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable code (e.g. weak_password, password_breached).
            message:
              type: string
    PlayerAuthTokenResponse:
      type: object
      required:
        - expires_at
        - expires_in
        - token_type
      properties:
        access_token:
          type: string
          description: Absent when `PLAYER_COOKIE_AUTH` and `PLAYER_COOKIE_OMIT_JSON_TOKENS` are set (access JWT is httpOnly cookie only).
        refresh_token:
          type: string
          description: Absent under the same conditions as access_token (refresh JWT is httpOnly cookie only).
        expires_at:
          type: integer
          format: int64
          description: Unix seconds when access JWT expires.
        expires_in:
          type: integer
          format: int64
          description: Access TTL in seconds (e.g. 900).
        token_type:
          type: string
          example: Bearer
  securitySchemes:
    staffBearer:
      type: http
      scheme: bearer
    playerBearer:
      type: http
      scheme: bearer
      description: |
        Bearer access JWT in the `Authorization` header (mobile / non-browser API clients).

        For browser SPAs with `PLAYER_COOKIE_AUTH`, you may use **`playerCookieAccess`** instead (httpOnly cookie; send requests with credentials).
        CSRF double-submit (`cc_player_csrf` cookie + `X-CSRF-Token` header) applies to mutating `/v1` requests when session cookies are present.
    playerCookieAccess:
      type: apiKey
      in: cookie
      name: cc_player_access
      description: |
        httpOnly access JWT cookie when `PLAYER_COOKIE_AUTH` is enabled — same claims as a Bearer access token.

        Send requests with credentials (e.g. `credentials: 'include'`). On PATCH/PUT/POST/DELETE to `/v1` (except documented auth/webhook exemptions),
        also send header `X-CSRF-Token` matching the readable `cc_player_csrf` cookie.

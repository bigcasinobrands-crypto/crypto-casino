# Example: restrict admin API routes to internal + VPN IPs (adapt before use).
# Deploy at your TLS edge; do not expose admin paths to the open internet.
#
# Upstream: adjust to your core API (e.g. Render private service, K8s Service).
upstream casino_core_api {
    server 127.0.0.1:9090;
}

server {
    listen 443 ssl http2;
    server_name admin-api.example.internal;

    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;

    # --- Allowlist: replace with your office / VPN / bastion CIDRs ---
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    # allow 203.0.113.0/24;   # example VPN egress
    deny all;

    location /v1/admin {
        proxy_pass http://casino_core_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://casino_core_api;
    }
}
